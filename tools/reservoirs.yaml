reservoirs:
  # node_id must match exactly the hex string printed by the gateway (uppercase, "0x" prefix)

  "0X7758":
    - sensor_id: 1
      alias: CON
      name: Castelo de Consumo
      level_max_cm: 450
      volume_max_L: 80000
      sensor_offset_cm: 20

  "0XEE02":
    - sensor_id: 1
      alias: CAV
      name: Castelo de Incêndio
      level_max_cm: 450
      volume_max_L: 80000
      sensor_offset_cm: 20

  "0X2EC4":
    - sensor_id: 1
      alias: CB31
      name: Casa de Bombas Nº3 - Tanque 1
      level_max_cm: 200
      volume_max_L: 40000
      sensor_offset_cm: 10
    - sensor_id: 2
      alias: CB32
      name: Casa de Bombas Nº3 - Tanque 2
      level_max_cm: 200
      volume_max_L: 40000
      sensor_offset_cm: 10

  "0X9EAC":
    - sensor_id: 1
      alias: CIE1
      name: Cisterna IE - Tanque 1
      level_max_cm: 200
      volume_max_L: 245000
      sensor_offset_cm: 10
    - sensor_id: 2
      alias: CIE2
      name: Cisterna IE - Tanque 2
      level_max_cm: 200
      volume_max_L: 245000
      sensor_offset_cm: 10

  "0X3456":
    - sensor_id: 1
      alias: CBIF1
      name: Casa de Bombas IF - Tanque 1
      level_max_cm: 200
      volume_max_L: 40000
      sensor_offset_cm: 10
    - sensor_id: 2
      alias: CBIF2
      name: Casa de Bombas IF - Tanque 2
      level_max_cm: 200
      volume_max_L: 40000
      sensor_offset_cm: 10
