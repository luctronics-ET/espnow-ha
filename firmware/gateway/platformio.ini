[env:esp32-s3-gateway]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 921600

# Only compile v3 .cpp files; exclude old gateway_v*.ino sketches
build_src_filter =
    +<src/*.cpp>
    +<src/*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../shared

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32-s3-gateway-release]
extends   = env:esp32-s3-gateway
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Os
