# ── Gateway C3 SuperMini (padrão, mais disponível) ───────────────────────────
[env:gateway-c3]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 921600

build_src_filter = +<*.cpp> +<*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../shared

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:gateway-c3-release]
extends   = env:gateway-c3
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Os

# ── Gateway S3 (reservado para produção / OTA) ────────────────────────────────
[env:gateway-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 921600

build_src_filter = +<*.cpp> +<*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../shared

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
