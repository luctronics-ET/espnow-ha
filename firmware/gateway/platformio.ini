# ── Gateway C3 SuperMini (padrão, mais disponível) ───────────────────────────
[env:gateway-c3]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 921600

build_src_filter = +<*.cpp> +<*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../shared

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

[env:gateway-c3-release]
extends   = env:gateway-c3
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Os

[env:gateway-c3-v2]
extends = env:gateway-c3
build_flags =
    ${env:gateway-c3.build_flags}
    -DGATEWAY_VERSION_SUFFIX='"-usbv2"'
    -DGATEWAY_READY_REPEAT_COUNT=5
    -DGATEWAY_READY_REPEAT_INTERVAL_MS=1000
    -DGATEWAY_STATUS_INTERVAL_MS=30000
    -DGATEWAY_JSON_FLUSH=0

[env:gateway-c3-v2-safe]
extends = env:gateway-c3-v2
upload_speed = 115200

