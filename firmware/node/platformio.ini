[env:esp32-c3-supermini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 921600

# Only include .cpp files (excludes any leftover .ino)
build_src_filter = +<*.cpp> +<*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Iinclude
    -I../shared

lib_deps =
lib_extra_dirs = include

[env:esp32-c3-supermini-release]
extends   = env:esp32-c3-supermini
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Os

# Dedicated profile for NODE-03 (CB31/CB32) connected on /dev/ttyACM2
[env:node3-cb3]
extends      = env:esp32-c3-supermini-release
upload_port  = /dev/ttyACM2
monitor_port = /dev/ttyACM2

# Temporary slow upload for ACM1 (troubleshooting)
[env:slow-acm1]
extends      = env:esp32-c3-supermini-release
upload_port  = /dev/ttyACM1
monitor_port = /dev/ttyACM1
upload_speed = 115200

# ESP32 DevKit (classic ESP32) - useful for standalone relay nodes
[env:esp32-devkit-relay]
platform  = espressif32
board     = esp32dev
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 460800

# Only include .cpp files (excludes any leftover .ino)
build_src_filter = +<*.cpp> +<*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DDEFAULT_LED_PIN=2
    -DDEFAULT_NUM_SENSORS=0
    -Iinclude
    -I../shared

lib_deps =
lib_extra_dirs = include

# ESP32 DevKit (classic ESP32) - sensor node, 1 sensor
# Default pins: TRIG1=5, ECHO1=18
[env:esp32-devkit]
platform  = espressif32
board     = esp32dev
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed  = 460800

build_src_filter = +<*.cpp> +<*.h>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DDEFAULT_NUM_SENSORS=1
    -Iinclude
    -I../shared

lib_deps =
lib_extra_dirs = include

# ESP32 DevKit - sensor node, release (lower log verbosity)
[env:esp32-devkit-release]
extends   = env:esp32-devkit
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DDEFAULT_NUM_SENSORS=1
    -Os
    -Iinclude
    -I../shared

