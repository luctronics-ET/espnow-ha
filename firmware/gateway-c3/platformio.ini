# ── Gateway USB — ESP32-C3 SuperMini ─────────────────────────────────────────
# Compartilha o source com firmware/gateway/src via src_dir.
# Não duplicar arquivos .cpp/.h — editar apenas em firmware/gateway/src/.

[platformio]
src_dir = ../gateway/src

[env:gateway-c3-supermini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; Partições OTA 2×1.5 MB, SPIFFS 512 KB (Flash 4 MB)
board_build.partitions = partitions.csv

monitor_speed    = 115200
upload_speed     = 921600

; Native USB CDC — obrigatório no SuperMini (sem CH340 externo)
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../shared

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
