<!DOCTYPE html>
<html lang="pt-BR" x-data="dadosApp()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aguada — Dados Brutos</title>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none}
    .mono { font-family: 'Courier New', monospace; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen" x-cloak>

  <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">A</div>
          <span class="font-semibold text-lg text-gray-800 dark:text-gray-100">Aguada CMASM</span>
        </div>
        <nav class="hidden md:flex items-center gap-1">
          <a href="index.html"         class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dashboard</a>
          <a href="scada.html"         class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">SCADA</a>
          <a href="history.html"       class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Histórico</a>
          <a href="consumption.html"   class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Consumo</a>
          <a href="abastecimento.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Abastecimento</a>
          <a href="dados.html"         class="px-4 py-2 rounded-md text-sm font-medium bg-blue-600 text-white">Dados</a>
          <a href="report.html"        class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Relatório</a>
        </nav>
        <button @click="toggleDark()" class="p-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg x-show="!darkMode" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg x-show="darkMode"  class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07l-.71.71M6.34 17.66l-.71.71M17.66 17.66l-.71-.71M6.34 6.34l-.71-.71M12 7a5 5 0 100 10A5 5 0 0012 7z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <h1 class="text-xl font-semibold mb-4 text-gray-700 dark:text-gray-200">Dados Brutos</h1>

    <!-- Toolbar -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 mb-4 flex flex-wrap items-center gap-4">
      <!-- Filtro reservatório -->
      <div class="flex items-center gap-2">
        <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Reservatório</label>
        <select x-model="filterAlias" @change="applyFilters()" class="border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Todos</option>
          <option value="CON">CON</option>
          <option value="CAV">CAV</option>
          <option value="CB31">CB31</option>
          <option value="CB32">CB32</option>
          <option value="CIE1">CIE1</option>
          <option value="CIE2">CIE2</option>
          <option value="CBIF1">CBIF1</option>
          <option value="CBIF2">CBIF2</option>
        </select>
      </div>
      <!-- Período -->
      <div class="flex items-center gap-2">
        <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Período</label>
        <select x-model="period" @change="loadAll()" class="border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="24h">Últimas 24h</option>
          <option value="7d">7 dias</option>
          <option value="30d">30 dias</option>
        </select>
      </div>
      <!-- Busca texto -->
      <div class="flex items-center gap-2 flex-1 min-w-48">
        <input x-model="filterText" @input="applyFilters()" type="text" placeholder="Filtrar por valor, nível, %..." class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <!-- Status / auto-refresh -->
      <div class="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 ml-auto">
        <span :class="loading ? 'bg-yellow-400 animate-pulse' : 'bg-green-500'" class="w-2 h-2 rounded-full"></span>
        <span x-text="loading ? 'Carregando...' : filtered.length + ' / ' + allRows.length + ' registros'"></span>
      </div>
    </div>

    <!-- Tabela -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden mb-4">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 dark:bg-gray-700/60 text-xs uppercase text-gray-500 dark:text-gray-400 tracking-wide">
              <th class="px-4 py-3 text-left cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" @click="sortBy('ts')">
                Timestamp
                <span x-text="sortCol==='ts' ? (sortDir==='asc'?'↑':'↓') : '⇅'" class="ml-1 opacity-50"></span>
              </th>
              <th class="px-4 py-3 text-left cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" @click="sortBy('alias')">
                Sensor
                <span x-text="sortCol==='alias' ? (sortDir==='asc'?'↑':'↓') : '⇅'" class="ml-1 opacity-50"></span>
              </th>
              <th class="px-4 py-3 text-right cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" @click="sortBy('distance_cm')">
                Dist. (cm)
                <span x-text="sortCol==='distance_cm' ? (sortDir==='asc'?'↑':'↓') : '⇅'" class="ml-1 opacity-50"></span>
              </th>
              <th class="px-4 py-3 text-right cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" @click="sortBy('level_cm')">
                Nível (cm)
                <span x-text="sortCol==='level_cm' ? (sortDir==='asc'?'↑':'↓') : '⇅'" class="ml-1 opacity-50"></span>
              </th>
              <th class="px-4 py-3 text-right cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" @click="sortBy('volume_l')">
                Volume (L)
                <span x-text="sortCol==='volume_l' ? (sortDir==='asc'?'↑':'↓') : '⇅'" class="ml-1 opacity-50"></span>
              </th>
              <th class="px-4 py-3 text-right cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" @click="sortBy('pct')">
                Nível %
                <span x-text="sortCol==='pct' ? (sortDir==='asc'?'↑':'↓') : '⇅'" class="ml-1 opacity-50"></span>
              </th>
              <th class="px-4 py-3 text-right">RSSI</th>
              <th class="px-4 py-3 text-right">Vbat</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
            <template x-if="paged.length === 0 && !loading">
              <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400 dark:text-gray-600">Nenhum dado encontrado.</td></tr>
            </template>
            <template x-for="(row, i) in paged" :key="row._id">
              <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">
                <td class="px-4 py-2 mono text-xs text-gray-500 dark:text-gray-400" x-text="fmt(row.ts)"></td>
                <td class="px-4 py-2">
                  <span class="px-2 py-0.5 rounded-full text-xs font-semibold" :class="badgeClass(row.alias)" x-text="row.alias"></span>
                </td>
                <td class="px-4 py-2 text-right mono text-xs" x-text="row.distance_cm != null ? row.distance_cm : '—'"></td>
                <td class="px-4 py-2 text-right mono text-xs" x-text="row.level_cm != null ? row.level_cm : '—'"></td>
                <td class="px-4 py-2 text-right mono text-xs" x-text="row.volume_l != null ? Math.round(row.volume_l) : '—'"></td>
                <td class="px-4 py-2 text-right">
                  <span class="text-xs font-medium"
                    :class="{'text-green-600':row.pct>=80,'text-blue-500':row.pct>=50&&row.pct<80,'text-yellow-500':row.pct>=20&&row.pct<50,'text-red-500':row.pct<20}"
                    x-text="row.pct != null ? row.pct + '%' : '—'"></span>
                </td>
                <td class="px-4 py-2 text-right mono text-xs text-gray-400" x-text="row.rssi != null ? row.rssi + ' dBm' : '—'"></td>
                <td class="px-4 py-2 text-right mono text-xs text-gray-400" x-text="row.vbat != null ? row.vbat + ' V' : '—'"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Paginação -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-3 flex items-center justify-between text-sm">
      <span class="text-xs text-gray-400 dark:text-gray-500"
        x-text="`Mostrando ${Math.min((page-1)*perPage+1, filtered.length)}–${Math.min(page*perPage, filtered.length)} de ${filtered.length}`">
      </span>
      <div class="flex items-center gap-1">
        <button @click="page=1" :disabled="page===1" class="px-2 py-1 rounded text-xs border border-gray-200 dark:border-gray-600 disabled:opacity-30 hover:bg-gray-100 dark:hover:bg-gray-700">««</button>
        <button @click="page--" :disabled="page===1" class="px-2 py-1 rounded text-xs border border-gray-200 dark:border-gray-600 disabled:opacity-30 hover:bg-gray-100 dark:hover:bg-gray-700">‹</button>
        <span class="px-3 text-xs text-gray-500 dark:text-gray-400" x-text="`${page} / ${totalPages}`"></span>
        <button @click="page++" :disabled="page>=totalPages" class="px-2 py-1 rounded text-xs border border-gray-200 dark:border-gray-600 disabled:opacity-30 hover:bg-gray-100 dark:hover:bg-gray-700">›</button>
        <button @click="page=totalPages" :disabled="page>=totalPages" class="px-2 py-1 rounded text-xs border border-gray-200 dark:border-gray-600 disabled:opacity-30 hover:bg-gray-100 dark:hover:bg-gray-700">»»</button>
      </div>
      <select x-model.number="perPage" @change="page=1" class="border border-gray-200 dark:border-gray-600 rounded px-2 py-1 text-xs bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300">
        <option value="25">25/pág</option>
        <option value="50">50/pág</option>
        <option value="100">100/pág</option>
      </select>
    </div>
  </main>

  <script>
  const ALIASES_ALL = ['CON','CAV','CB31','CB32','CIE1','CIE2','CBIF1','CBIF2'];
  const BADGE_COLORS = {
    CON:'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
    CAV:'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300',
    CB31:'bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300',
    CB32:'bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300',
    CIE1:'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-300',
    CIE2:'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-300',
    CBIF1:'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
    CBIF2:'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
  };

  function dadosApp() {
    return {
      darkMode: localStorage.getItem('darkMode') === 'true',
      period: '24h',
      filterAlias: '',
      filterText: '',
      allRows: [],
      filtered: [],
      loading: false,
      sortCol: 'ts',
      sortDir: 'desc',
      page: 1,
      perPage: 50,

      get totalPages() { return Math.max(1, Math.ceil(this.filtered.length / this.perPage)); },
      get paged() { const s=(this.page-1)*this.perPage; return this.filtered.slice(s, s+this.perPage); },

      init() { this.loadAll(); },
      toggleDark() { this.darkMode = !this.darkMode; localStorage.setItem('darkMode', this.darkMode); },

      async loadAll() {
        this.loading = true;
        try {
          const results = await Promise.all(
            ALIASES_ALL.map(a =>
              fetch(`/api/history/${a}?period=${this.period}`)
                .then(r => r.ok ? r.json() : [])
                .then(rows => rows.map((r,i) => ({ ...r, alias: a, _id: `${a}-${i}-${r.ts}` })))
            )
          );
          this.allRows = results.flat().sort((a,b) => b.ts - a.ts);
          this.applyFilters();
        } catch(e) {
          console.error(e);
        } finally {
          this.loading = false;
        }
      },

      applyFilters() {
        let rows = this.allRows;
        if (this.filterAlias) rows = rows.filter(r => r.alias === this.filterAlias);
        if (this.filterText.trim()) {
          const q = this.filterText.trim().toLowerCase();
          rows = rows.filter(r =>
            String(r.alias||'').toLowerCase().includes(q) ||
            String(r.distance_cm||'').includes(q) ||
            String(r.level_cm||'').includes(q) ||
            String(r.pct||'').includes(q) ||
            String(Math.round(r.volume_l||0)).includes(q)
          );
        }
        this.doSort(rows);
        this.page = 1;
      },

      sortBy(col) {
        if (this.sortCol === col) this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
        else { this.sortCol = col; this.sortDir = 'desc'; }
        this.doSort(this.filtered);
      },

      doSort(rows) {
        const col = this.sortCol, dir = this.sortDir;
        this.filtered = [...rows].sort((a,b) => {
          const av = a[col] ?? -Infinity, bv = b[col] ?? -Infinity;
          if (typeof av === 'string') return dir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          return dir === 'asc' ? av - bv : bv - av;
        });
      },

      badgeClass(alias) { return BADGE_COLORS[alias] || 'bg-gray-100 text-gray-700'; },

      fmt(ts) {
        if (!ts) return '—';
        return new Date(ts*1000).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      }
    };
  }
  </script>
</body>
</html>
