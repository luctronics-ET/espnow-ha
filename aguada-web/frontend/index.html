<!DOCTYPE html>
<html lang="pt-BR" x-data="dashboardApp()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aguada — Dashboard</title>
  <link rel="stylesheet" href="assets/tailwind.css?v=1" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none; }
    .card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .tank-btn { cursor: pointer; transition: opacity 0.15s, box-shadow 0.15s; }
    .tank-btn:hover { opacity: 0.95; box-shadow: 0 0 0 2px #6b7280; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen" x-cloak>

  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo + Title -->
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">A</div>
          <span class="font-semibold text-lg text-gray-800 dark:text-gray-100">Aguada CMASM</span>
        </div>

        <!-- Navigation Tabs -->
        <nav class="hidden md:flex items-center gap-1">
          <a href="index.html" class="px-4 py-2 rounded-md text-sm font-medium bg-blue-600 text-white">Dashboard</a>
          <a href="scada.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">SCADA</a>
          <a href="history.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Histórico</a>
          <a href="consumption.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Consumo</a>
          <a href="abastecimento.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Abastecimento</a>
          <a href="dados.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dados</a>
          <a href="report.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Relatório</a>
          <a href="dispositivos.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dispositivos</a>
          <a href="documentacao.html" class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Documentação</a>
        </nav>

        <!-- Right Controls -->
        <div class="flex items-center gap-3">
          <!-- WS Status -->
          <div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
            <span :class="wsConnected ? 'bg-green-500' : 'bg-red-500'" class="w-2 h-2 rounded-full inline-block"></span>
            <span x-text="wsConnected ? 'Conectado' : 'Desconectado'"></span>
            <span x-show="lastUpdate" class="hidden sm:inline" x-text="'· ' + timeAgo(lastUpdate)"></span>
          </div>
          <!-- Dark Mode Toggle -->
          <button @click="toggleDark()" class="p-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Alternar tema">
            <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07l-.71.71M6.34 17.66l-.71.71M17.66 17.66l-.71-.71M6.34 6.34l-.71-.71M12 7a5 5 0 100 10A5 5 0 0012 7z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <!-- Total Reservoirs -->
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm card-hover">
        <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Reservatórios</div>
        <div class="text-3xl font-bold text-gray-800 dark:text-gray-100" x-text="reservoirs.length"></div>
        <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">monitorados</div>
      </div>
      <!-- Online Nodes -->
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm card-hover">
        <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Nós Online</div>
        <div class="text-3xl font-bold" :class="onlineCount === reservoirs.length && reservoirs.length > 0 ? 'text-green-600' : 'text-yellow-500'">
          <span x-text="onlineCount"></span><span class="text-lg text-gray-400 dark:text-gray-500">/<span x-text="reservoirs.length"></span></span>
        </div>
        <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">ativos</div>
      </div>
      <!-- Total Volume -->
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm card-hover">
        <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Volume Total</div>
        <div class="text-3xl font-bold text-blue-600 dark:text-blue-400" x-text="(totalVolume / 1000).toFixed(1) + ' m³'"></div>
        <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">armazenados</div>
      </div>
      <!-- Average % -->
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm card-hover">
        <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Nível Médio</div>
        <div class="text-3xl font-bold"
          :class="{
            'text-green-600': avgPct >= 80,
            'text-blue-500': avgPct >= 50 && avgPct < 80,
            'text-yellow-500': avgPct >= 20 && avgPct < 50,
            'text-red-500': avgPct < 20 && avgPct >= 0
          }"
          x-text="avgPct + '%'">
        </div>
        <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">nível médio</div>
      </div>
    </div>

    <!-- Reservoir Cards Grid -->
    <template x-if="reservoirs.length === 0">
      <div class="flex flex-col items-center justify-center py-20 text-gray-400 dark:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <p class="text-lg font-medium">Nenhum reservatório</p>
        <p class="text-sm mt-1">Aguardando dados via WebSocket...</p>
      </div>
    </template>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <template x-for="r in orderedReservoirs" :key="r.alias">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden card-hover tank-btn" @click="openModal(r.alias)">
          <!-- Colored Header -->
          <div class="px-4 py-3 flex items-center justify-between"
            :class="{
              'bg-gray-400': !r.online || r.pct === null,
              'bg-green-500': r.online && !r.out_of_range && r.pct !== null && r.pct >= 80,
              'bg-blue-500': r.online && !r.out_of_range && r.pct !== null && r.pct >= 50 && r.pct < 80,
              'bg-yellow-400': r.online && !r.out_of_range && r.pct !== null && r.pct >= 20 && r.pct < 50,
              'bg-red-500': r.online && !r.out_of_range && r.pct !== null && r.pct < 20
            }"
            :style="r.online && r.out_of_range ? 'background-color:#f97316' : ''">
            <span class="font-bold text-white text-lg" x-text="r.alias"></span>
            <span class="text-white text-sm font-medium" x-text="!r.online ? 'Offline' : (r.out_of_range ? 'Config?' : (r.pct !== null ? r.pct + '%' : 'N/A'))"></span>
          </div>

          <!-- Progress Bar -->
          <div class="h-2 bg-gray-200 dark:bg-gray-700">
            <div class="h-2 transition-all duration-500"
              :class="{
                'bg-gray-400': !r.online || r.pct === null,
                'bg-green-500': r.online && !r.out_of_range && r.pct !== null && r.pct >= 80,
                'bg-blue-500': r.online && !r.out_of_range && r.pct !== null && r.pct >= 50 && r.pct < 80,
                'bg-yellow-400': r.online && !r.out_of_range && r.pct !== null && r.pct >= 20 && r.pct < 50,
                'bg-red-500': r.online && !r.out_of_range && r.pct !== null && r.pct < 20
              }"
              :style="'width: ' + (r.online && r.pct !== null ? r.pct : 0) + '%;' + (r.online && r.out_of_range ? 'background-color:#f97316' : '')">
            </div>
          </div>

          <!-- Details -->
          <div class="px-4 py-3 space-y-1.5 text-sm">
            <div class="flex justify-between">
              <span class="text-gray-500 dark:text-gray-400">Nível</span>
              <span class="font-medium" x-text="r.level_cm !== null && r.level_cm !== undefined ? r.level_cm + ' cm' : '—'"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-500 dark:text-gray-400">Volume</span>
              <span class="font-medium" x-text="r.volume_l !== null && r.volume_l !== undefined ? formatVol(r.volume_l) + ' L' : '—'"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-500 dark:text-gray-400">Capacidade</span>
              <span class="font-medium" x-text="r.volume_max_l !== null && r.volume_max_l !== undefined ? formatVol(r.volume_max_l) + ' L' : '—'"></span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-500 dark:text-gray-400">RSSI</span>
              <span class="font-medium" :class="rssiColor(r.rssi)" x-text="r.rssi !== null && r.rssi !== undefined ? r.rssi + ' dBm' : '—'"></span>
            </div>
            <div class="flex justify-between pt-1 border-t border-gray-100 dark:border-gray-700">
              <span class="text-gray-400 dark:text-gray-500 text-xs">Última leitura</span>
              <span class="text-xs text-gray-500 dark:text-gray-400" x-text="r.ts ? timeAgo(r.ts) : '—'"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- Modal de detalhe + inserção manual -->
  <div x-show="modal.open" x-cloak
       class="fixed inset-0 z-[100] flex items-center justify-center p-4"
       @keydown.escape.window="closeModal()">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="closeModal()"></div>

    <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md" @click.stop>
      <div class="flex items-start justify-between p-5 border-b border-gray-100 dark:border-gray-700">
        <div>
          <div class="flex items-center gap-2">
            <h2 class="text-base font-bold text-gray-800 dark:text-gray-100" x-text="modal.alias"></h2>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                  :class="!modal.online ? 'bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-400' : (!modal.out_of_range ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400' : '')"
                  :style="modal.online && modal.out_of_range ? 'background-color:#fff7ed;color:#c2410c' : ''"
                  x-text="!modal.online ? 'Offline' : (modal.out_of_range ? 'Fora de config' : 'Online')"></span>
          </div>
          <p class="text-xs text-gray-400 mt-0.5" x-text="modal.name"></p>
        </div>
        <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors mt-0.5">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="p-5">
        <div class="flex gap-5 mb-5">
          <div class="flex flex-col items-center flex-shrink-0">
            <div class="relative w-16 rounded-lg overflow-hidden border-2"
                 :class="modal.online ? 'border-gray-300 dark:border-gray-500' : 'border-gray-300 dark:border-gray-600'"
                 style="height:96px;"
                 :style="modal.online ? 'background:#e5e7eb' : 'background:#d1d5db'">
              <div class="absolute bottom-0 left-0 right-0 transition-all duration-700"
                   :style="modal.online
                     ? `height:${modal.pct}%; background: ${modal.color};`
                     : `height:${modal.pct}%; background: linear-gradient(to top, #6b7280, #9ca3af);`">
              </div>
              <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-sm font-bold drop-shadow"
                      :class="modal.pct > 30 ? 'text-white' : 'text-gray-700'"
                      x-text="modal.pct + '%'"></span>
              </div>
            </div>
            <div class="text-xs text-gray-400 mt-1 font-mono" x-text="modal.online ? Math.round(modal.volume_l || 0) + ' L' : '—'"></div>
          </div>

          <div class="flex-1 grid grid-cols-2 gap-2 text-xs">
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
              <div class="text-gray-400 dark:text-gray-500 mb-0.5">Nível</div>
              <div class="font-semibold text-gray-700 dark:text-gray-200" x-text="modal.level_cm != null ? modal.level_cm + ' cm' : '—'"></div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
              <div class="text-gray-400 dark:text-gray-500 mb-0.5">Volume</div>
              <div class="font-semibold text-gray-700 dark:text-gray-200" x-text="modal.volume_l != null ? Math.round(modal.volume_l) + ' L' : '—'"></div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
              <div class="text-gray-400 dark:text-gray-500 mb-0.5">RSSI</div>
              <div class="font-semibold text-gray-700 dark:text-gray-200" x-text="modal.rssi != null ? modal.rssi + ' dBm' : '—'"></div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
              <div class="text-gray-400 dark:text-gray-500 mb-0.5">Última leitura</div>
              <div class="font-semibold text-gray-700 dark:text-gray-200 leading-tight" x-text="modal.ts ? formatTs(modal.ts) : '—'"></div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
              <div class="text-gray-400 dark:text-gray-500 mb-0.5">Vol. máx</div>
              <div class="font-semibold text-gray-700 dark:text-gray-200" x-text="modal.volume_max_l != null ? Math.round(modal.volume_max_l) + ' L' : '—'"></div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-2">
              <div class="text-gray-400 dark:text-gray-500 mb-0.5">Nível máx</div>
              <div class="font-semibold text-gray-700 dark:text-gray-200" x-text="modal.level_max_cm != null ? modal.level_max_cm + ' cm' : '—'"></div>
            </div>
          </div>
        </div>

        <div class="border-t border-gray-100 dark:border-gray-700 pt-4">
          <div class="flex items-center gap-2 mb-3">
            <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
            <span class="text-sm font-semibold text-gray-600 dark:text-gray-300">Inserção manual</span>
          </div>

          <div class="flex gap-2 mb-3">
            <button @click="modal.manualMode = 'pct'"
                    :class="modal.manualMode === 'pct' ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'"
                    class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors">
              Por % (nível)
            </button>
            <button @click="modal.manualMode = 'volume'"
                    :class="modal.manualMode === 'volume' ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'"
                    class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors">
              Por volume (L)
            </button>
          </div>

          <div class="flex gap-2 items-end">
            <div class="flex-1">
              <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1"
                     x-text="modal.manualMode === 'pct' ? 'Percentual (%)' : 'Volume (litros)'"></label>
              <input type="number" x-model="modal.manualValue" min="0"
                     :max="modal.manualMode === 'pct' ? 100 : modal.volume_max_l"
                     :placeholder="modal.manualMode === 'pct' ? 'ex: 75' : 'ex: 60000'"
                     class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <button @click="submitManual()"
                    :disabled="modal.saving || !modal.manualValue"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5">
              <svg x-show="!modal.saving" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <svg x-show="modal.saving" class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
              Salvar
            </button>
          </div>

          <div x-show="modal.feedback" x-transition
               class="mt-2 text-xs rounded-lg px-3 py-2 font-medium"
               :class="modal.feedbackOk ? 'bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-400'"
               x-text="modal.feedback">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ORDERED_ALIASES = ['CON', 'CAV', 'CB31', 'CB32', 'CIE1', 'CIE2', 'CBIF1', 'CBIF2'];
    const ALIAS_COLORS = {
      'CBIF1': 'linear-gradient(to top, #2563eb, #60a5fa)',
      'CBIF2': 'linear-gradient(to top, #2563eb, #60a5fa)',
      'CIE1':  'linear-gradient(to top, #0891b2, #67e8f9)',
      'CIE2':  'linear-gradient(to top, #0891b2, #67e8f9)',
      'CB31':  'linear-gradient(to top, #7c3aed, #c4b5fd)',
      'CB32':  'linear-gradient(to top, #7c3aed, #c4b5fd)',
      'CON':   'linear-gradient(to top, #059669, #6ee7b7)',
      'CAV':   'linear-gradient(to top, #dc2626, #fca5a5)',
    };

    function dashboardApp() {
      return {
        darkMode: localStorage.getItem('darkMode') === 'true',
        reservoirs: [],
        wsConnected: false,
        lastUpdate: null,
        wsRetryDelay: 1000,
        ws: null,

        modal: {
          open: false,
          alias: '',
          name: '',
          online: false,
          out_of_range: false,
          pct: 0,
          volume_l: null,
          level_cm: null,
          rssi: null,
          ts: null,
          volume_max_l: null,
          level_max_cm: null,
          color: '',
          manualMode: 'pct',
          manualValue: '',
          saving: false,
          feedback: '',
          feedbackOk: true,
        },

        init() {
          this.connectWS();
        },

        toggleDark() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('darkMode', this.darkMode);
        },

        get onlineCount() {
          return this.reservoirs.filter(r => r.online).length;
        },

        get totalVolume() {
          return this.reservoirs.reduce((sum, r) => sum + (r.volume_l || 0), 0);
        },

        get avgPct() {
          const online = this.reservoirs.filter(r => r.online && r.pct !== null && r.pct !== undefined);
          if (online.length === 0) return 0;
          const total = online.reduce((s, r) => s + r.pct, 0);
          return Math.round(total / online.length);
        },

        get orderedReservoirs() {
          const normalizeAlias = (alias) => (alias || '').toString().trim().toUpperCase();
          const rank = new Map(ORDERED_ALIASES.map((alias, idx) => [normalizeAlias(alias), idx]));
          return [...this.reservoirs].sort((a, b) => {
            const ar = rank.has(normalizeAlias(a.alias)) ? rank.get(normalizeAlias(a.alias)) : Number.MAX_SAFE_INTEGER;
            const br = rank.has(normalizeAlias(b.alias)) ? rank.get(normalizeAlias(b.alias)) : Number.MAX_SAFE_INTEGER;
            if (ar !== br) return ar - br;
            return (a.alias || '').localeCompare(b.alias || '');
          });
        },

        connectWS() {
          const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
          this.ws = new WebSocket(`${protocol}//${location.host}/ws`);

          this.ws.onopen = () => {
            this.wsConnected = true;
            this.wsRetryDelay = 1000;
          };

          this.ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              this.lastUpdate = Math.floor(Date.now() / 1000);

              if (msg.type === 'snapshot') {
                this.reservoirs = msg.data || [];
              } else if (msg.type === 'reading') {
                const d = msg.data;
                const idx = this.reservoirs.findIndex(r => r.alias === d.alias);
                if (idx >= 0) {
                  this.reservoirs[idx] = { ...this.reservoirs[idx], ...d };
                  this.reservoirs = [...this.reservoirs];
                } else {
                  this.reservoirs = [...this.reservoirs, d];
                }
              }
            } catch(e) {
              console.error('WS parse error:', e);
            }
          };

          this.ws.onclose = () => {
            this.wsConnected = false;
            // Exponential backoff, max 30s
            setTimeout(() => this.connectWS(), this.wsRetryDelay);
            this.wsRetryDelay = Math.min(this.wsRetryDelay * 2, 30000);
          };

          this.ws.onerror = () => {
            this.ws.close();
          };
        },

        statusColor(pct, online) {
          if (!online || pct === null || pct === undefined) return 'bg-gray-400';
          if (pct >= 80) return 'bg-green-500';
          if (pct >= 50) return 'bg-blue-500';
          if (pct >= 20) return 'bg-yellow-400';
          return 'bg-red-500';
        },

        formatVol(v) {
          if (v >= 1000) return (v / 1000).toFixed(1) + 'k';
          return Math.round(v).toString();
        },

        getReservoir(alias) {
          return this.reservoirs.find(r => r.alias === alias) || null;
        },

        openModal(alias) {
          const r = this.getReservoir(alias);
          this.modal.alias = alias;
          this.modal.manualMode = 'pct';
          this.modal.manualValue = '';
          this.modal.saving = false;
          this.modal.feedback = '';
          this._fillModal(r || { alias, online: false });
          this.modal.open = true;
        },

        _fillModal(r) {
          this.modal.name = r.name || r.alias;
          this.modal.online = r.online ?? false;
          this.modal.out_of_range = r.out_of_range ?? false;
          this.modal.pct = r.pct != null ? Math.max(0, Math.min(100, r.pct)) : 0;
          this.modal.volume_l = r.volume_l ?? null;
          this.modal.level_cm = r.level_cm ?? null;
          this.modal.rssi = r.rssi ?? null;
          this.modal.ts = r.ts ?? null;
          this.modal.volume_max_l = r.volume_max_l ?? null;
          this.modal.level_max_cm = r.level_max_cm ?? null;
          this.modal.color = ALIAS_COLORS[this.modal.alias] || 'linear-gradient(to top, #3b82f6, #93c5fd)';
        },

        closeModal() {
          this.modal.open = false;
        },

        async submitManual() {
          if (!this.modal.manualValue) return;
          this.modal.saving = true;
          this.modal.feedback = '';
          try {
            const body = { alias: this.modal.alias };
            const val = parseFloat(this.modal.manualValue);
            if (isNaN(val) || val < 0) throw new Error('Valor inválido');
            if (this.modal.manualMode === 'pct') body.pct = val;
            else body.volume_l = val;

            const res = await fetch('/api/readings/manual', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            const json = await res.json();
            if (!res.ok) throw new Error(json.detail || 'Erro ao salvar');

            const idx = this.reservoirs.findIndex(r => r.alias === this.modal.alias);
            const updated = {
              ...(this.reservoirs[idx] || {}),
              alias: json.alias,
              pct: json.pct,
              volume_l: json.volume_l,
              level_cm: json.level_cm,
              ts: Math.floor(Date.now() / 1000),
              online: true,
            };
            if (idx >= 0) this.reservoirs[idx] = updated;
            else this.reservoirs.push(updated);
            this.reservoirs = [...this.reservoirs];
            this._fillModal(updated);

            this.modal.feedback = `Salvo: ${json.pct}% · ${Math.round(json.volume_l)} L`;
            this.modal.feedbackOk = true;
            this.modal.manualValue = '';
            this.lastUpdate = Math.floor(Date.now() / 1000);
          } catch(e) {
            this.modal.feedback = e.message || 'Erro ao salvar';
            this.modal.feedbackOk = false;
          } finally {
            this.modal.saving = false;
          }
        },

        timeAgo(ts) {
          if (!ts) return '—';
          const now = new Date();
          const then = typeof ts === 'number' ? new Date(ts * 1000) : new Date(ts);
          if (Number.isNaN(then.getTime())) return '—';
          const diffSec = Math.floor((now - then) / 1000);
          if (Number.isNaN(diffSec) || diffSec < 0) return '—';
          if (diffSec < 60) return `${diffSec}s atrás`;
          const diffMin = Math.floor(diffSec / 60);
          if (diffMin < 60) return `${diffMin}min atrás`;
          const diffH = Math.floor(diffMin / 60);
          return `${diffH}h atrás`;
        },

        formatTs(ts) {
          if (!ts) return '—';
          return new Date(ts * 1000).toLocaleString('pt-BR', {
            day: '2-digit', month: '2-digit', year: '2-digit',
            hour: '2-digit', minute: '2-digit'
          });
        },

        rssiColor(rssi) {
          if (rssi === null || rssi === undefined) return 'text-gray-400';
          if (rssi >= -60) return 'text-green-600';
          if (rssi >= -75) return 'text-yellow-600';
          return 'text-red-500';
        }
      };
    }
  </script>
</body>
