# ── RELATÓRIO DIÁRIO às 07:00 ──────────────────────────────────────────────────
- id: aguada_relatorio_diario
  alias: "Aguada: Relatório diário — 07:00"
  trigger:
    - platform: time
      at: "07:00:00"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_relatorio_diario
        title: "📊 Relatório Diário — Aguada"
        message: >
          **Situação às {{ now().strftime('%d/%m/%Y %H:%M') }}**

          🏰 Castelos:
          • CON: {{ states('sensor.aguada_con_pct') }}% — {{ (states('sensor.aguada_con_volume') | float(0) / 1000) | round(1) }} m³ | Var 24h: {{ states('sensor.aguada_con_consumo_24h') }} L
          • CAV: {{ states('sensor.aguada_cav_pct') }}% — {{ (states('sensor.aguada_cav_volume') | float(0) / 1000) | round(1) }} m³ | Var 24h: {{ states('sensor.aguada_cav_consumo_24h') }} L

          ⚙️ Casa de Bombas N3:
          • CB31: {{ states('sensor.aguada_cb31_pct') }}% — CB32: {{ states('sensor.aguada_cb32_pct') }}%
          • CB03 Total: {{ states('sensor.aguada_cb03_pct') }}%

          💧 Cisternas:
          • CIE1: {{ states('sensor.aguada_cie1_pct') }}% — {{ (states('sensor.aguada_cie1_volume') | float(0) / 1000) | round(1) }} m³
          • CIE2: {{ states('sensor.aguada_cie2_pct') }}% — {{ (states('sensor.aguada_cie2_volume') | float(0) / 1000) | round(1) }} m³
          • Cisternas Total: {{ states('sensor.aguada_cisternas_pct') }}%

          🌊 Sistema:
          • Volume total armazenado: {{ states('sensor.aguada_volume_total') }} m³ ({{ states('sensor.aguada_volume_total_pct') }}%)
          • Variação total 24h: {{ states('sensor.aguada_consumo_total_24h') }} m³
          • Vazamentos ativos: {% if is_state('binary_sensor.aguada_alarme_vazamento', 'on') %}⚠️ SIM{% else %}✅ Nenhum{% endif %}

# ── CBIF — Nível baixo / crítico ─────────────────────────────────────────────
- id: aguada_cbif_nivel_baixo
  alias: "Aguada CBIF: nível baixo (< 20%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.aguada_cbif_pct
      below: 20
  condition:
    - condition: template
      value_template: "{{ states('sensor.aguada_cbif_pct') not in ['unknown','unavailable'] }}"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_cbif_baixo
        title: "⚠️ CBIF — Nível Baixo"
        message: >
          Casa de Bombas IF em {{ states('sensor.aguada_cbif_pct') }}%
          ({{ states('sensor.aguada_cbif_volume') }} L).

- id: aguada_cbif_nivel_critico
  alias: "Aguada CBIF: nível crítico (< 10%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.aguada_cbif_pct
      below: 10
  condition:
    - condition: template
      value_template: "{{ states('sensor.aguada_cbif_pct') not in ['unknown','unavailable'] }}"
  action:
    - service: input_boolean.turn_on
      entity_id: input_boolean.aguada_cbif_alerta_bomba_seca
    - service: persistent_notification.create
      data:
        notification_id: aguada_cbif_critico
        title: "🚨 CBIF — Nível CRÍTICO / Risco Bomba Seca"
        message: >
          Casa de Bombas IF em {{ states('sensor.aguada_cbif_pct') }}%
          ({{ states('sensor.aguada_cbif_volume') }} L).
          Verificar bomba! Risco de operação a seco (NBR 5626).

- id: aguada_cbif_nivel_ok
  alias: "Aguada CBIF: nível normalizado (> 20%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.aguada_cbif_pct
      above: 20
  action:
    - service: input_boolean.turn_off
      entity_id: input_boolean.aguada_cbif_alerta_bomba_seca
    - service: persistent_notification.dismiss
      data:
        notification_id: aguada_cbif_critico
    - service: persistent_notification.dismiss
      data:
        notification_id: aguada_cbif_baixo

# ── CBIF — Registrar estado operacional (via botão) ───────────────────────────
- id: aguada_cbif_registrar_estado
  alias: "Aguada CBIF: registrar estado no logbook"
  trigger:
    - platform: state
      entity_id: input_button.aguada_cbif_registrar_estado
  action:
    - service: logbook.log
      data:
        name: "CBIF — Registro Operacional"
        message: >
          Modo: {{ states('input_select.aguada_cbif_modo_operacao') }} |
          Bomba 1: {{ states('input_select.aguada_cbif_bomba1_estado') }} |
          Bomba 2: {{ states('input_select.aguada_cbif_bomba2_estado') }} |
          Válvula entrada: {{ states('input_select.aguada_cbif_valvula_entrada') }} |
          Válvula saída: {{ states('input_select.aguada_cbif_valvula_saida') }} |
          Obs: {{ states('input_text.aguada_cbif_observacao') }}
        entity_id: input_button.aguada_cbif_registrar_estado
    - service: persistent_notification.create
