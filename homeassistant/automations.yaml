# Aguada — Automações de Alerta
# Referenciar em configuration.yaml:
#   automation: !include automations.yaml
#
# Thresholds:
#   Baixo    = 20%
#   Crítico  = 10%
#   Offline  = gateway desconectado

# ── CON — Castelo de Consumo ──────────────────────────────────────────────────
- id: aguada_con_baixo
  alias: "Aguada: CON nível baixo (< 20%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.aguada_con_pct
      below: 20
  condition:
    - condition: template
      value_template: "{{ states('sensor.aguada_con_pct') not in ['unknown','unavailable'] }}"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_con_baixo
        title: "⚠️ CON — Nível Baixo"
        message: >
          Castelo de Consumo está em {{ states('sensor.aguada_con_pct') }}%
          ({{ states('sensor.aguada_con_volume') }} L).

- id: aguada_con_critico
  alias: "Aguada: CON nível crítico (< 10%)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.aguada_con_pct
      below: 10
  condition:
    - condition: template
      value_template: "{{ states('sensor.aguada_con_pct') not in ['unknown','unavailable'] }}"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_con_critico
        title: "🚨 CON — Nível CRÍTICO"
        message: >
          Castelo de Consumo está em {{ states('sensor.aguada_con_pct') }}%
          ({{ states('sensor.aguada_con_volume') }} L). Ação imediata necessária!

