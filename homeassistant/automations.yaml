          B1: {{ states('input_select.aguada_cbif_bomba1_estado') }} |
          B2: {{ states('input_select.aguada_cbif_bomba2_estado') }} |
          V.Ent: {{ states('input_select.aguada_cbif_valvula_entrada') }} |
          V.Saí: {{ states('input_select.aguada_cbif_valvula_saida') }}

# ── Hidrômetros — Registrar leituras (via botão) ──────────────────────────────
- id: aguada_hidrometro_registrar
  alias: "Aguada: registrar leitura de hidrômetros"
  trigger:
    - platform: state
      entity_id: input_button.aguada_hidrometro_registrar
  action:
    - service: logbook.log
      data:
        name: "Hidrômetros — Leitura Registrada"
        message: >
          HID-IF: ant={{ states('input_number.aguada_hidro_if_anterior') }} | atu={{ states('input_number.aguada_hidro_if_atual') }} | Δ={{ states('sensor.aguada_hidro_if_delta') }} m³ | St: {{ states('input_select.aguada_hidro_if_status') }}
          HID-PRAIA: ant={{ states('input_number.aguada_hidro_praia_anterior') }} | atu={{ states('input_number.aguada_hidro_praia_atual') }} | Δ={{ states('sensor.aguada_hidro_praia_delta') }} m³ | St: {{ states('input_select.aguada_hidro_praia_status') }}
          HID-AV: ant={{ states('input_number.aguada_hidro_av_anterior') }} | atu={{ states('input_number.aguada_hidro_av_atual') }} | Δ={{ states('sensor.aguada_hidro_av_delta') }} m³ | St: {{ states('input_select.aguada_hidro_av_status') }}
          HID-AV|AZ: ant={{ states('input_number.aguada_hidro_avaz_anterior') }} | atu={{ states('input_number.aguada_hidro_avaz_atual') }} | Δ={{ states('sensor.aguada_hidro_avaz_delta') }} m³ | St: {{ states('input_select.aguada_hidro_avaz_status') }}
          AZ estimado: {{ states('sensor.aguada_hidro_az_estimado') }} m³
          Obs: {{ states('input_text.aguada_hidro_observacao') }}
        entity_id: input_button.aguada_hidrometro_registrar
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('binary_sensor.aguada_hidro_if_valido', 'on')
                   or not is_state('binary_sensor.aguada_hidro_praia_valido', 'on')
                   or not is_state('binary_sensor.aguada_hidro_av_valido', 'on')
                   or not is_state('binary_sensor.aguada_hidro_avaz_valido', 'on') }}
          sequence:
            - service: persistent_notification.create
              data:
                notification_id: aguada_hidro_invalido
                title: "⚠️ Hidrômetros — Leitura Inválida"
                message: >
                  Atenção: uma ou mais leituras têm valor atual menor que o anterior.
                  Verifique os campos antes de confirmar.
      default:
        - service: persistent_notification.create
          data:
            notification_id: aguada_hidro_registrado
            title: "✅ Hidrômetros — Leitura Registrada"
            message: >
              {{ now().strftime('%d/%m/%Y %H:%M') }} — Leituras salvas no logbook.
              HID-IF Δ={{ states('sensor.aguada_hidro_if_delta') }} m³ |
              HID-PRAIA Δ={{ states('sensor.aguada_hidro_praia_delta') }} m³ |
              HID-AV Δ={{ states('sensor.aguada_hidro_av_delta') }} m³ |
              AZ est.={{ states('sensor.aguada_hidro_az_estimado') }} m³

# ── Laudos — Registrar laudo de qualidade (via botão) ─────────────────────────
- id: aguada_laudo_registrar
  alias: "Aguada: registrar laudo de qualidade"
  trigger:
    - platform: state
      entity_id: input_button.aguada_laudo_registrar
  action:
    - service: logbook.log
      data:
        name: "Laudo de Qualidade da Água"
        message: >
          Ponto: {{ states('input_select.aguada_laudo_ponto_coleta') }} |
          Data: {{ states('input_datetime.aguada_laudo_data_coleta') }} |
          pH={{ states('input_number.aguada_laudo_ph') }} |
          Cl={{ states('input_number.aguada_laudo_cloro') }} mg/L |
          Turb={{ states('input_number.aguada_laudo_turbidez') }} uT |
          Col={{ states('input_number.aguada_laudo_coliformes') }} UFC/100mL |
          Conformidade: {{ states('input_select.aguada_laudo_conformidade') }} |
          Lab: {{ states('input_text.aguada_laudo_laboratorio') }} |
          Resp: {{ states('input_text.aguada_laudo_responsavel') }} |
          Obs: {{ states('input_text.aguada_laudo_observacao') }}
        entity_id: input_button.aguada_laudo_registrar
    - choose:
        - conditions:
            - condition: state
