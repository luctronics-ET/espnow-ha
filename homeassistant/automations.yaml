# ── Gateway offline ───────────────────────────────────────────────────────────
- id: aguada_gateway_offline
  alias: "Aguada: Gateway offline"
  trigger:
    - platform: state
      entity_id: sensor.aguada_gateway_status
      to: "offline"
      for:
        minutes: 5
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_gateway_offline
        title: "🔴 Gateway Aguada offline"
        message: >
          O gateway ESP32 está sem comunicação há mais de 5 minutos.
          Verifique a conectividade WiFi/MQTT.

- id: aguada_gateway_online
  alias: "Aguada: Gateway voltou online"
  trigger:
    - platform: state
      entity_id: sensor.aguada_gateway_status
      to: "online"
  condition:
    - condition: state
      entity_id: persistent_notification.aguada_gateway_offline
      state: "notifying"
  action:
    - service: persistent_notification.dismiss
      data:
        notification_id: aguada_gateway_offline
    - service: persistent_notification.create
      data:
        notification_id: aguada_gateway_online
        title: "✅ Gateway Aguada online"
        message: "Gateway ESP32 reconectado com sucesso."

# ── OTA do Gateway ───────────────────────────────────────────────────────────
- id: aguada_gateway_ota_error
  alias: "Aguada: Erro OTA no gateway"
  trigger:
    - platform: state
      entity_id: sensor.aguada_gateway_ota_evento
      to: "error"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_gateway_ota_error
        title: "🚨 Gateway OTA com erro"
        message: >
          A atualização OTA do gateway falhou.
          Código de erro: {{ states('sensor.aguada_gateway_ota_erro') }}.
          Versão reportada: {{ states('sensor.aguada_gateway_firmware') }}.

- id: aguada_gateway_ota_start
  alias: "Aguada: OTA do gateway iniciado"
  trigger:
    - platform: state
      entity_id: sensor.aguada_gateway_ota_evento
      to: "start"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_gateway_ota_status
        title: "⬆️ OTA do gateway iniciado"
        message: >
          O gateway iniciou atualização OTA.
          Versão atual reportada: {{ states('sensor.aguada_gateway_firmware') }}.

- id: aguada_gateway_ota_end
  alias: "Aguada: OTA do gateway concluído"
  trigger:
    - platform: state
      entity_id: sensor.aguada_gateway_ota_evento
      to: "end"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_gateway_ota_status
        title: "✅ OTA do gateway concluído"
        message: >
          O gateway concluiu a atualização OTA e deve reiniciar em seguida.

# ── DETECÇÃO DE VAZAMENTO POR RESERVATÓRIO ────────────────────────────────────
# Baseado nos binary_sensors em template_sensors.yaml
# Limiar: 5% da capacidade por hora de perda contínua (janela de 2h)

- id: aguada_con_vazamento_detectado
  alias: "Aguada: CON — Vazamento detectado"
  trigger:
    - platform: state
      entity_id: binary_sensor.aguada_con_vazamento
      to: "on"
      for:
        minutes: 10
  condition:
    - condition: template
      value_template: "{{ states('sensor.aguada_con_volume') not in ['unknown','unavailable'] }}"
  action:
    - service: persistent_notification.create
      data:
        notification_id: aguada_con_vazamento
        title: "🚰 CON — Possível Vazamento"
        message: >
          Castelo de Consumo perdendo volume acima do limiar (> 4.000 L/h) por
          pelo menos 10 minutos. Volume atual: {{ states('sensor.aguada_con_volume') }} L
          ({{ states('sensor.aguada_con_pct') }}%). Taxa: {{ states('sensor.aguada_con_taxa_variacao') }} L/h.
          Verifique tubulações e conexões.

- id: aguada_con_vazamento_resolvido
  alias: "Aguada: CON — Vazamento resolvido"
  trigger:
    - platform: state
      entity_id: binary_sensor.aguada_con_vazamento
      to: "off"
  action:
    - service: persistent_notification.dismiss
      data:
        notification_id: aguada_con_vazamento

