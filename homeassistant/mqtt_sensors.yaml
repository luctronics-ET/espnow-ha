# Aguada — MQTT Sensors (compatibilidade)
#
# Este arquivo existe para manter compatibilidade com configurações antigas que
# ainda usam: mqtt: !include mqtt_sensors.yaml
#
# Conteúdo equivalente ao mqtt_gateway_sensors.yaml:
# - discovery habilitado (reservatórios via bridge.py)
# - sensores manuais apenas do gateway

# Habilita processamento de MQTT Discovery no Home Assistant
# (as entidades de reservatórios são publicadas pelo bridge.py)
discovery: true

sensor:
  - name: "Gateway Status"
    unique_id: aguada_gateway_status
    state_topic: aguada/gateway/status
    icon: mdi:router-wireless

  - name: "Gateway OTA Evento"
    unique_id: aguada_gateway_ota_evento
    state_topic: aguada/gateway/ota
    value_template: "{{ value_json.event | default('unknown') }}"
    icon: mdi:update

  - name: "Gateway OTA Erro"
    unique_id: aguada_gateway_ota_erro
    state_topic: aguada/gateway/ota
    value_template: "{{ value_json.error if value_json.error is defined else 0 }}"
    icon: mdi:alert-circle-outline

  - name: "Gateway Firmware"
    unique_id: aguada_gateway_firmware
    state_topic: aguada/gateway/info
    value_template: "{{ value_json.fw_version | default('unknown') }}"
    icon: mdi:tag
