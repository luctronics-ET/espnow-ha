# Aguada — MQTT Discovery Sensors
# Conforme NODES_INVENTARIO.md v2.2
# Versão: 3.0 — state_class adicionado para estatísticas de longo prazo
#
# Inclua em configuration.yaml:
#   # Se o arquivo estiver em /config/aguada/mqtt_sensors.yaml
#   homeassistant:
#     packages:
#       aguada: !include aguada/mqtt_sensors.yaml
#
#   # Ou, se estiver direto em /config/mqtt_sensors.yaml
#   # mqtt: !include mqtt_sensors.yaml
#
# Tópicos:
#   NODE-01 (CON)   → aguada/node/1/telemetry      (ESPHome direto)
#   NODE-02 (CAV)   → aguada/node/2/telemetry      (Arduino Nano+Ethernet)
#   NODE-03 (CB31)  → aguada/node/3/1/telemetry    (gateway ESP-NOW dual)
#   NODE-03 (CB32)  → aguada/node/3/2/telemetry    (gateway ESP-NOW dual)
#   NODE-04 (CIE1)  → aguada/node/4/1/telemetry    (gateway ESP-NOW dual)
#   NODE-04 (CIE2)  → aguada/node/4/2/telemetry    (gateway ESP-NOW dual)
#
# Capacidades (NODES_INVENTARIO v2.2):
#   CON  → 80.000 L (80m³) | CAV  → 80.000 L (80m³)
#   CB31 → 40.000 L (40m³) | CB32 → 40.000 L (40m³)
#   CIE1 → 245.000 L (245m³) | CIE2 → 245.000 L (245m³)
#   Total sensoriado: 730.000 L (730m³)

sensor:

    # ── NODE-01: CON — Castelo de Consumo (80m³, 450cm, offset 20cm) ──────────
    - name: "CON Distância"
      unique_id: aguada_con_distancia
      state_topic: aguada/node/1/telemetry
      value_template: "{{ value_json.distance_cm }}"
      unit_of_measurement: cm
      device_class: distance
      state_class: measurement
      icon: mdi:ruler
      availability_topic: aguada/gateway/status
      payload_available: online
      payload_not_available: offline

    - name: "CON Nível"
      unique_id: aguada_con_nivel
      state_topic: aguada/node/1/telemetry
      value_template: "{{ value_json.level_cm }}"
      unit_of_measurement: cm
      state_class: measurement
      icon: mdi:waves-arrow-up
      availability_topic: aguada/gateway/status
      payload_available: online
      payload_not_available: offline

    - name: "CON Volume"
      unique_id: aguada_con_volume
      state_topic: aguada/node/1/telemetry
      value_template: "{{ value_json.volume_l }}"
      unit_of_measurement: L
      state_class: measurement
      icon: mdi:water
      availability_topic: aguada/gateway/status
      payload_available: online
      payload_not_available: offline

    - name: "CON Volume %"
      unique_id: aguada_con_pct
      state_topic: aguada/node/1/telemetry
      value_template: "{{ (value_json.volume_l / 80000 * 100) | round(1) }}"
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:water-percent
      availability_topic: aguada/gateway/status
      payload_available: online
      payload_not_available: offline

    - name: "CON Bateria"
      unique_id: aguada_con_bateria
      state_topic: aguada/node/1/telemetry
      value_template: "{{ (value_json.vin_mv / 1000) | round(2) }}"
      unit_of_measurement: V
      device_class: voltage
      state_class: measurement
      icon: mdi:battery
      availability_topic: aguada/gateway/status
      payload_available: online
      payload_not_available: offline

    - name: "CON RSSI"
      unique_id: aguada_con_rssi
      state_topic: aguada/node/1/telemetry
      value_template: "{{ value_json.rssi }}"
      unit_of_measurement: dBm
