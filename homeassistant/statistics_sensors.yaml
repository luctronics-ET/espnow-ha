# Aguada — Sensores Estatísticos (Statistics Platform)
# Versão: 3.0
#
# Inclua em configuration.yaml ANTES dos template_sensors:
#   sensor:
#     - platform: statistics
#       ... (listar cada um abaixo) ...
#
# Ou use include_dir_merge_list:
#   sensor: !include_dir_merge_list sensors/
#
# Estes sensores alimentam template_sensors.yaml:
#   - aguada_con_vol_min_24h / aguada_con_vol_max_24h  → consumo 24h
#   - aguada_con_taxa_segundo  → detecção de vazamento (L/s)
#   - aguada_con_pct_media_7d  → médias semanais
#
# Intervalo de envio dos nodes: ~30s → ~120 amostras/hora
# Limites de sampling_size dimensionados para cobrir o max_age corretamente.

# ─────────────────────────────────────────────────────────────────────────────
# BLOCO 1: MIN/MAX 24H — Base para cálculo de consumo diário
# ─────────────────────────────────────────────────────────────────────────────

- platform: statistics
  name: "Aguada CON Vol Min 24h"
  unique_id: aguada_con_vol_min_24h
  entity_id: sensor.aguada_con_volume
  state_characteristic: value_min
  max_age:
    hours: 24
  sampling_size: 300

- platform: statistics
  name: "Aguada CON Vol Max 24h"
  unique_id: aguada_con_vol_max_24h
