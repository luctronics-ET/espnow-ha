# Aguada — Ajustes e contexto quantitativo manual

aguada_operacao_ajuste_volume_l:
  name: Aguada — Ajuste manual de volume
  icon: mdi:water-plus
  min: -500000
  max: 500000
  step: 100
  mode: box
  unit_of_measurement: L

