          ## 8. Documentação Técnica

          Manter os seguintes documentos arquivados e atualizados:

          - **Plantas as-built** dos reservatórios (cotas, dimensões, locação)
          - **Plantas da rede de distribuição** (traçado, diâmetros, materiais)
          - **Manuais dos equipamentos** (bombas, sensores, gateway ESP32)
          - **Laudos de qualidade** (arquivo físico e digital)
          - **Relatórios de inspeção** visual e manutenção preventiva
          - **Registros de acionamento** de bombas e intervenções manuais

          > Para vincular documentos (PDFs, imagens) diretamente ao Home Assistant,
          > utilize a integração **Local Files** ou **Samba/NFS** e crie um card de imagem/media.

