title: AGUADA V3 — Home Assistant
views:

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 1: VISÃO GERAL
  # Resumo do sistema, gauges de todos os reservatórios, alertas
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Visão Geral
    path: visao-geral
    icon: mdi:water
    badges:
      - entity: sensor.aguada_volume_total_pct
        name: Sistema %
      - entity: binary_sensor.aguada_alarme_vazamento
        name: Vazamento
      - entity: binary_sensor.aguada_alarme_nivel_critico
        name: Nível crítico
      - entity: sensor.aguada_gateway_status
        name: Gateway
    cards:

      # ── Alerta de Gateway Offline (visível só quando offline) ─────────────
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aguada_gateway_status
            state: "offline"
        card:
          type: markdown
          content: >
            ## 🔴 ALERTA — GATEWAY OFFLINE
            O gateway ESP32 está sem comunicação com o broker MQTT.
            Verifique energia, rede e conectividade do gateway.

      # ── Alerta de Vazamento (visível só quando ativo) ──────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.aguada_alarme_vazamento
            state: "on"
        card:
          type: markdown
          content: >
            ## 🚨 ALERTA — VAZAMENTO DETECTADO
            Um ou mais reservatórios apresentam queda anormal de volume.
            Verifique imediatamente a aba **Vazamentos**.

      # ── Alerta de Nível Crítico (visível só quando ativo) ──────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.aguada_alarme_nivel_critico
            state: "on"
        card:
          type: markdown
          content: >
            ## ⚠️ ALERTA — NÍVEL CRÍTICO (< 10%)
            Um ou mais reservatórios estão com nível crítico de água.

      # ── Status do Gateway ──────────────────────────────────────────────────
      - type: entity
        entity: sensor.aguada_gateway_status
        name: Gateway ESP32
        icon: mdi:router-wireless

      # ── Volume Total do Sistema ────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_volume_total
            name: Volume Total
            min: 0
            max: 730
            unit: "m³"
            needle: true
            severity:
              green: 292
              yellow: 146
              red: 73
          - type: gauge
            entity: sensor.aguada_volume_total_pct
            name: Sistema %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10

      # ── Resumo de métricas chave ────────────────────────────────────────────
      - type: entities
        title: Resumo do Sistema
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_volume_total
            name: Volume total armazenado
            icon: mdi:water-well
          - entity: sensor.aguada_volume_total_pct
            name: Ocupação total %
            icon: mdi:water-percent
          - entity: sensor.aguada_cisternas_volume
            name: Cisternas (CIE1+CIE2)
            icon: mdi:water-pump
          - entity: sensor.aguada_cb03_pct
            name: Casa de Bombas N3 %
            icon: mdi:pump
          - entity: sensor.aguada_consumo_total_24h
            name: Variação total 24h
            icon: mdi:water-minus
          - entity: binary_sensor.aguada_alarme_vazamento
            name: Alarme de Vazamento
            icon: mdi:pipe-leak
          - entity: binary_sensor.aguada_alarme_nivel_critico
            name: Alarme Nível Crítico
            icon: mdi:alert-circle

      # ── Gauges — Castelos ──────────────────────────────────────────────────
      - type: markdown
        content: "### 🏰 Castelos"

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_con_pct
            name: CON — Consumo
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cav_pct
            name: CAV — Incêndio
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10

      # ── Gauges — Bombas N3 ─────────────────────────────────────────────────
      - type: markdown
        content: "### ⚙️ Casa de Bombas N3"

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_cb31_pct
            name: CB31
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cb32_pct
            name: CB32
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cb03_pct
            name: CB03 (total)
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10

      # ── Gauges — Cisternas ─────────────────────────────────────────────────
      - type: markdown
        content: "### 💧 Cisternas"

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_cie1_pct
            name: CIE1
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cie2_pct
            name: CIE2
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cisternas_pct
            name: Cisternas (total)
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10

      # ── Evolução 24h — todos os reservatórios ─────────────────────────────
      - type: history-graph
        title: Evolução de Volume % — últimas 24h
        hours_to_show: 24
        entities:
          - entity: sensor.aguada_con_pct
            name: CON
          - entity: sensor.aguada_cav_pct
            name: CAV
          - entity: sensor.aguada_cb31_pct
            name: CB31
          - entity: sensor.aguada_cb32_pct
            name: CB32
          - entity: sensor.aguada_cie1_pct
            name: CIE1
          - entity: sensor.aguada_cie2_pct
            name: CIE2

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 2: CONSUMO & TENDÊNCIAS
  # Consumo diário estimado, médias semanais, taxa de variação
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Consumo
    path: consumo
    icon: mdi:chart-bar
    badges: []
    cards:

      # ── Consumo estimado hoje por reservatório ─────────────────────────────
      - type: entities
        title: Variação de Volume nas Últimas 24h (max − min)
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_consumo_24h
            name: CON — Castelo de Consumo
            icon: mdi:water-minus
          - entity: sensor.aguada_cav_consumo_24h
            name: CAV — Castelo de Incêndio
            icon: mdi:water-minus
          - entity: sensor.aguada_cb31_consumo_24h
            name: CB31 — Bombas N3.1
            icon: mdi:water-minus
          - entity: sensor.aguada_cb32_consumo_24h
            name: CB32 — Bombas N3.2
            icon: mdi:water-minus
          - entity: sensor.aguada_cie1_consumo_24h
            name: CIE1 — Cisterna
            icon: mdi:water-minus
          - entity: sensor.aguada_cie2_consumo_24h
            name: CIE2 — Cisterna
            icon: mdi:water-minus
          - type: divider
          - entity: sensor.aguada_consumo_total_24h
            name: TOTAL VARIADO
            icon: mdi:sigma

      # ── Médias 7 dias por grupo ────────────────────────────────────────────
      - type: entities
        title: Nível Médio — Últimos 7 Dias
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_media_7d
            name: CON — Média 7d
            icon: mdi:chart-line
          - entity: sensor.aguada_cav_media_7d
            name: CAV — Média 7d
            icon: mdi:chart-line
          - entity: sensor.aguada_cb03_media_7d
            name: CB03 — Média 7d
            icon: mdi:chart-line
          - entity: sensor.aguada_cisternas_media_7d
            name: Cisternas — Média 7d
            icon: mdi:chart-line

      # ── Taxa de variação atual ─────────────────────────────────────────────
      - type: entities
        title: Taxa de Variação Atual (L/h) — janela 2h
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_taxa_variacao
            name: CON
          - entity: sensor.aguada_cav_taxa_variacao
            name: CAV
          - entity: sensor.aguada_cb31_taxa_variacao
            name: CB31
          - entity: sensor.aguada_cb32_taxa_variacao
            name: CB32
          - entity: sensor.aguada_cie1_taxa_variacao
            name: CIE1
          - entity: sensor.aguada_cie2_taxa_variacao
            name: CIE2

      # ── Tendência 7 dias — Castelos ────────────────────────────────────────
      - type: history-graph
        title: Tendência CON / CAV — 7 dias
        hours_to_show: 168
        entities:
          - entity: sensor.aguada_con_pct
            name: CON %
          - entity: sensor.aguada_cav_pct
            name: CAV %

      # ── Tendência 7 dias — Bombas + Cisternas ─────────────────────────────
      - type: history-graph
        title: Tendência CB31/CB32 / CIE1/CIE2 — 7 dias
        hours_to_show: 168
        entities:
          - entity: sensor.aguada_cb31_pct
            name: CB31 %
          - entity: sensor.aguada_cb32_pct
            name: CB32 %
          - entity: sensor.aguada_cie1_pct
            name: CIE1 %
          - entity: sensor.aguada_cie2_pct
            name: CIE2 %

      # ── Estatísticas diárias — Volume (requer state_class configurado) ─────
      - type: statistic-graph
        title: CON — Volume Diário (m³) — 7 dias
        entities:
          - entity: sensor.aguada_con_volume
            name: CON
        period:
          calendar:
            period: day
        stat_types:
          - min
          - max
          - mean

      - type: statistic-graph
        title: CIE1+CIE2 — Volume Diário — 7 dias
        entities:
          - entity: sensor.aguada_cie1_volume
            name: CIE1
          - entity: sensor.aguada_cie2_volume
            name: CIE2
        period:
          calendar:
            period: day
        stat_types:
          - min
          - max
          - mean

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 3: OPERAÇÃO & BALANÇO
  # Contexto manual do operador + saldo líquido 12h/24h
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Operação
    path: operacao
    icon: mdi:clipboard-pulse-outline
    badges:
      - entity: binary_sensor.aguada_contexto_operacional_ativo
        name: Contexto manual
      - entity: sensor.aguada_saldo_total_12h
        name: Saldo 12h
      - entity: sensor.aguada_saldo_total_24h
        name: Saldo 24h
    cards:

      - type: markdown
        content: >
          ### 🧭 Operação & Balanço

          Nesta aba, o operador informa contexto manual e acompanha **saldo líquido**,
          que é diferente da **amplitude diária** (`max - min`).

          - **Saldo 12h / 24h** = variação líquida real na janela
          - **Consumo 24h** = amplitude diária, útil como indicador auxiliar

      - type: entities
        title: Contexto Operacional Manual
        show_header_toggle: false
        entities:
          - entity: binary_sensor.aguada_contexto_operacional_ativo
            name: Contexto manual ativo
          - entity: sensor.aguada_contexto_operacional
            name: Resumo do contexto
          - entity: input_boolean.aguada_operacao_recarga_externa
            name: Recarga externa em andamento
          - entity: input_boolean.aguada_operacao_manutencao
            name: Manutenção em andamento
          - entity: input_boolean.aguada_operacao_bomba_manual
            name: Operação manual de bomba
          - entity: input_boolean.aguada_operacao_inspecao_vazamento
            name: Inspeção de vazamento
          - entity: input_select.aguada_operacao_reservatorio
            name: Reservatório / setor
          - entity: input_select.aguada_operacao_tipo
            name: Tipo de evento
          - entity: input_number.aguada_operacao_ajuste_volume_l
            name: Ajuste manual de volume (L)
          - entity: input_text.aguada_operacao_observacao
            name: Observação do operador

      - type: entities
        title: Balanço do Sistema
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_saldo_total_12h
            name: Saldo líquido 12h
            icon: mdi:scale-balance
          - entity: sensor.aguada_saldo_total_24h
            name: Saldo líquido 24h
            icon: mdi:scale-balance
          - entity: sensor.aguada_consumo_total_24h
            name: Amplitude 24h (proxy auxiliar)
            icon: mdi:water-minus
          - type: divider
          - entity: sensor.aguada_castelos_saldo_24h
            name: Castelos — saldo 24h
          - entity: sensor.aguada_bombas_saldo_24h
            name: Bombas N3 — saldo 24h
          - entity: sensor.aguada_cisternas_saldo_24h
            name: Cisternas — saldo 24h

      - type: entities
        title: Saldo por Reservatório
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_saldo_12h
            name: CON — saldo 12h
          - entity: sensor.aguada_con_saldo_24h
            name: CON — saldo 24h
          - entity: sensor.aguada_cav_saldo_12h
            name: CAV — saldo 12h
          - entity: sensor.aguada_cav_saldo_24h
            name: CAV — saldo 24h
          - entity: sensor.aguada_cb31_saldo_12h
            name: CB31 — saldo 12h
          - entity: sensor.aguada_cb31_saldo_24h
            name: CB31 — saldo 24h
          - entity: sensor.aguada_cb32_saldo_12h
            name: CB32 — saldo 12h
          - entity: sensor.aguada_cb32_saldo_24h
            name: CB32 — saldo 24h
          - entity: sensor.aguada_cie1_saldo_12h
            name: CIE1 — saldo 12h
          - entity: sensor.aguada_cie1_saldo_24h
            name: CIE1 — saldo 24h
          - entity: sensor.aguada_cie2_saldo_12h
            name: CIE2 — saldo 12h
          - entity: sensor.aguada_cie2_saldo_24h
            name: CIE2 — saldo 24h

      - type: history-graph
        title: Volume Total do Sistema — 48h
        hours_to_show: 48
        entities:
          - entity: sensor.aguada_volume_total
            name: Volume total (m³)

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 3: DETECÇÃO DE VAZAMENTO
  # Status por reservatório, taxa de variação, gráficos de taxa
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Vazamentos
    path: vazamentos
    icon: mdi:pipe-leak
    badges: []
    cards:

      # ── Alarme mestre ──────────────────────────────────────────────────────
      - type: entity
        entity: binary_sensor.aguada_alarme_vazamento
        name: Alarme de Vazamento — Sistema
        icon: mdi:pipe-leak

      # ── Status por reservatório ────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: binary_sensor.aguada_con_vazamento
            name: CON
            icon: mdi:pipe-leak
          - type: entity
            entity: binary_sensor.aguada_cav_vazamento
            name: CAV
            icon: mdi:pipe-leak
          - type: entity
            entity: binary_sensor.aguada_cb31_vazamento
            name: CB31
            icon: mdi:pipe-leak

      - type: horizontal-stack
        cards:
          - type: entity
            entity: binary_sensor.aguada_cb32_vazamento
            name: CB32
            icon: mdi:pipe-leak
          - type: entity
            entity: binary_sensor.aguada_cie1_vazamento
            name: CIE1
            icon: mdi:pipe-leak
          - type: entity
            entity: binary_sensor.aguada_cie2_vazamento
            name: CIE2
            icon: mdi:pipe-leak

      # ── Tabela de limiares de vazamento ───────────────────────────────────
      - type: markdown
        content: >
          ### Limiares de Detecção (queda sustentada por 2h)

          | Reservatório | Capacidade | Limiar de Alarme |
          |---|---|---|
          | CON / CAV | 80.000 L | > 4.000 L/h |
          | CB31 / CB32 | 40.000 L | > 2.000 L/h |
          | CIE1 / CIE2 | 245.000 L | > 12.250 L/h |

          *Limiar = 5% da capacidade por hora de perda contínua.*

      # ── Taxa de variação atual ─────────────────────────────────────────────
      - type: entities
        title: Taxa de Variação Atual (L/h)
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_taxa_variacao
            name: CON
          - entity: sensor.aguada_cav_taxa_variacao
            name: CAV
          - entity: sensor.aguada_cb31_taxa_variacao
            name: CB31
          - entity: sensor.aguada_cb32_taxa_variacao
            name: CB32
          - entity: sensor.aguada_cie1_taxa_variacao
            name: CIE1
          - entity: sensor.aguada_cie2_taxa_variacao
            name: CIE2

      # ── Gráfico de taxa de variação (castelos) ────────────────────────────
      - type: history-graph
        title: Taxa de Variação CON / CAV — 12h
        hours_to_show: 12
        entities:
          - entity: sensor.aguada_con_taxa_variacao
            name: CON (L/h)
          - entity: sensor.aguada_cav_taxa_variacao
            name: CAV (L/h)

      # ── Gráfico de nível com zoom (24h) para detecção visual ─────────────
      - type: history-graph
        title: Volume CON — 48h (detecção visual)
        hours_to_show: 48
        entities:
          - entity: sensor.aguada_con_volume
            name: CON (L)

      - type: history-graph
        title: Volume CIE1/CIE2 — 48h
        hours_to_show: 48
        entities:
          - entity: sensor.aguada_cie1_volume
            name: CIE1 (L)
          - entity: sensor.aguada_cie2_volume
            name: CIE2 (L)

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 4: CASTELOS — CON / CAV
  # Detalhe completo dos castelos de consumo e incêndio
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Castelos
    path: castelos
    icon: mdi:castle
    badges: []
    cards:

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_con_pct
            name: CON %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cav_pct
            name: CAV %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10

      - type: entities
        title: CON — Castelo de Consumo (80m³)
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_nivel
            name: Nível (cm)
          - entity: sensor.aguada_con_volume
            name: Volume (L)
          - entity: sensor.aguada_con_pct
            name: Volume %
          - entity: sensor.aguada_con_distancia
            name: Distância sensor
          - entity: sensor.aguada_con_consumo_24h
            name: Variação 24h (L)
          - entity: sensor.aguada_con_taxa_variacao
            name: Taxa atual (L/h)
          - entity: sensor.aguada_con_media_7d
            name: Média 7 dias %
          - type: divider
          - entity: sensor.aguada_con_bateria
            name: Bateria (V)
          - entity: sensor.aguada_con_rssi
            name: RSSI (dBm)
          - entity: binary_sensor.aguada_con_vazamento
            name: Detecção vazamento

      - type: entities
        title: CAV — Castelo de Incêndio (80m³)
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_cav_nivel
            name: Nível (cm)
          - entity: sensor.aguada_cav_volume
            name: Volume (L)
          - entity: sensor.aguada_cav_pct
            name: Volume %
          - entity: sensor.aguada_cav_distancia
            name: Distância sensor
          - entity: sensor.aguada_cav_consumo_24h
            name: Variação 24h (L)
          - entity: sensor.aguada_cav_taxa_variacao
            name: Taxa atual (L/h)
          - entity: sensor.aguada_cav_media_7d
            name: Média 7 dias %
          - type: divider
          - entity: sensor.aguada_cav_bateria
            name: Bateria (V)
          - entity: sensor.aguada_cav_rssi
            name: RSSI (dBm)
          - entity: binary_sensor.aguada_cav_vazamento
            name: Detecção vazamento

      - type: history-graph
        title: CON / CAV — Volume % — 48h
        hours_to_show: 48
        entities:
          - entity: sensor.aguada_con_pct
            name: CON %
          - entity: sensor.aguada_cav_pct
            name: CAV %

      - type: history-graph
        title: CON / CAV — Volume absoluto (L) — 7 dias
        hours_to_show: 168
        entities:
          - entity: sensor.aguada_con_volume
            name: CON (L)
          - entity: sensor.aguada_cav_volume
            name: CAV (L)

      - type: statistic-graph
        title: CON — Estatísticas Diárias (min/média/max)
        entities:
          - entity: sensor.aguada_con_pct
            name: CON %
        period:
          calendar:
            period: day
        stat_types:
          - min
          - mean
          - max

      - type: statistic-graph
        title: CAV — Estatísticas Diárias (min/média/max)
        entities:
          - entity: sensor.aguada_cav_pct
            name: CAV %
        period:
          calendar:
            period: day
        stat_types:
          - min
          - mean
          - max

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 5: BOMBAS N3 — CB31 / CB32
  # Casa de Bombas que alimenta os castelos a partir das cisternas
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Bombas N3
    path: bombas
    icon: mdi:pump
    badges: []
    cards:

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_cb31_pct
            name: CB31 %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cb32_pct
            name: CB32 %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cb03_pct
            name: CB03 Total %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
