  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 9: CBIF — CASA DE BOMBAS IF (CBIF1 / CBIF2)
  # node_id 0x3456 | 2 sensores | + controle manual de bombas e válvulas
  # ═══════════════════════════════════════════════════════════════════════════
  - title: CBIF
    path: cbif
    icon: mdi:pump
    badges:
      - entity: sensor.aguada_cbif_pct
        name: CBIF %
      - entity: input_boolean.aguada_cbif_alerta_bomba_seca
        name: Bomba seca
    cards:

      - type: markdown
        content: >
          ### ⚙️ Casa de Bombas IF — CBIF1 / CBIF2

          Dois reservatórios de **40.000 L cada** (total 80.000 L).
          **Sem sensor instalado** — volume inserido manualmente pelo eletricista (~06h00).

          > Registre o volume observado abaixo e pressione **Registrar Estado** para salvar.
          > Para gerar o Relatório Diário, use a aba **Relatório**.

      # ── Gauge CBIF (template sensors calculados a partir da entrada manual) ──
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aguada_cbif1_pct
            name: CBIF1 %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cbif2_pct
            name: CBIF2 %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10
          - type: gauge
            entity: sensor.aguada_cbif_pct
            name: CBIF Total %
            min: 0
            max: 100
            unit: "%"
            needle: true
            severity:
              green: 40
              yellow: 20
              red: 10

      # ── Entrada manual de volume ────────────────────────────────────────────
      - type: entities
        title: CBIF1 — Volume observado (40.000 L cap.)
        show_header_toggle: false
        entities:
          - entity: input_number.aguada_cbif1_volume_manual
            name: Volume atual (L) — inserir manualmente
          - entity: sensor.aguada_cbif1_volume
            name: Volume confirmado (L)
          - entity: sensor.aguada_cbif1_pct
            name: Volume %
          - entity: input_number.aguada_cbif1_volume_anterior
            name: Volume anterior (L) — atualizado pelo relatório

      - type: entities
        title: CBIF2 — Volume observado (40.000 L cap.)
        show_header_toggle: false
        entities:
          - entity: input_number.aguada_cbif2_volume_manual
            name: Volume atual (L) — inserir manualmente
          - entity: sensor.aguada_cbif2_volume
            name: Volume confirmado (L)
          - entity: sensor.aguada_cbif2_pct
            name: Volume %
          - entity: input_number.aguada_cbif2_volume_anterior
            name: Volume anterior (L) — atualizado pelo relatório

      - type: entities
        title: CBIF — Total e Delta Diário
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_cbif_volume
            name: Volume total (L)
          - entity: sensor.aguada_cbif_pct
            name: Volume total %
          - entity: sensor.aguada_cbif_delta
            name: Delta desde último relatório (L)
            icon: mdi:delta

      # ── Estado manual — Bombas e Válvulas ──────────────────────────────────
      - type: entities
        title: Estado Operacional Manual — Bombas e Válvulas
        show_header_toggle: false
        entities:
          - entity: input_select.aguada_cbif_modo_operacao
            name: Modo de operação
            icon: mdi:cog-transfer-outline
          - type: divider
          - entity: input_select.aguada_cbif_bomba1_estado
            name: Bomba 1 — Estado
            icon: mdi:pump
          - entity: input_select.aguada_cbif_bomba2_estado
            name: Bomba 2 — Estado
            icon: mdi:pump
          - type: divider
          - entity: input_select.aguada_cbif_valvula_entrada
            name: Válvula de entrada
            icon: mdi:valve
          - entity: input_select.aguada_cbif_valvula_saida
            name: Válvula de saída
            icon: mdi:valve
          - type: divider
          - entity: input_boolean.aguada_cbif_manutencao
            name: Manutenção em andamento
            icon: mdi:wrench-cog
          - entity: input_boolean.aguada_cbif_alerta_bomba_seca
            name: Alerta bomba seca
            icon: mdi:alert-circle
          - type: divider
          - entity: input_text.aguada_cbif_observacao
            name: Observação operacional
            icon: mdi:text-box-outline

      # ── Botão Registrar Estado ─────────────────────────────────────────────
      - type: button
        entity: input_button.aguada_cbif_registrar_estado
        name: Registrar Estado no Logbook
        icon: mdi:content-save-check-outline
        tap_action:
          action: call-service
          service: input_button.press
          service_data:
            entity_id: input_button.aguada_cbif_registrar_estado

      # ── Histórico CBIF ─────────────────────────────────────────────────────
      - type: history-graph
        title: CBIF1 / CBIF2 — Volume % — 48h
        hours_to_show: 48
        entities:
          - entity: sensor.aguada_cbif1_pct
            name: CBIF1 %
          - entity: sensor.aguada_cbif2_pct
            name: CBIF2 %

      - type: history-graph
        title: CBIF1 / CBIF2 — Volume % — 7 dias
        hours_to_show: 168
        entities:
          - entity: sensor.aguada_cbif1_pct
            name: CBIF1 %
          - entity: sensor.aguada_cbif2_pct
            name: CBIF2 %

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 10: RELATÓRIO DIÁRIO
  # Espelho do relatório de inspeção (~06h00) — EL preenche, valida e gera
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Relatório
    path: relatorio
    icon: mdi:file-chart-outline
    badges:
      - entity: input_text.aguada_relatorio_inspetor
        name: Inspetor
    cards:

      # ── Cabeçalho / Identificação ──────────────────────────────────────────
      - type: entities
        title: "▶ 1. Identificação da Inspeção"
        show_header_toggle: false
        entities:
          - entity: input_text.aguada_relatorio_inspetor
            name: Nome do inspetor (EL)
            icon: mdi:account-hard-hat

      # ── Entrada manual CBIF ────────────────────────────────────────────────
      - type: entities
        title: "▶ 2. CBIF — Volume Observado (inserir manualmente)"
        show_header_toggle: false
        entities:
          - entity: input_number.aguada_cbif1_volume_manual
            name: CBIF1 — Volume atual (L)
            icon: mdi:water
          - entity: input_number.aguada_cbif2_volume_manual
            name: CBIF2 — Volume atual (L)
            icon: mdi:water
          - entity: sensor.aguada_cbif_pct
            name: CBIF Total %
          - entity: sensor.aguada_cbif_delta
            name: Delta desde último relatório (L)
            icon: mdi:delta
          - entity: input_text.aguada_relatorio_observacao_cbif
            name: Observação CBIF

      # ── Dados automáticos dos sensores ────────────────────────────────────
      - type: entities
        title: "▶ 3. Dados Automáticos dos Sensores (verificar)"
        show_header_toggle: false
        entities:
          - entity: sensor.aguada_con_volume
            name: CON — Volume atual (L)
          - entity: sensor.aguada_con_pct
            name: CON — %
          - type: divider
          - entity: sensor.aguada_cav_volume
            name: CAV — Volume atual (L)
          - entity: sensor.aguada_cav_pct
            name: CAV — %
          - type: divider
          - entity: sensor.aguada_cb03_volume
            name: CB03 (N3) — Volume total (L)
          - entity: sensor.aguada_cb03_pct
            name: CB03 (N3) — %
          - type: divider
          - entity: sensor.aguada_cisternas_volume
            name: Cisternas — Volume total (m³)
          - entity: sensor.aguada_cisternas_pct
            name: Cisternas — %
          - type: divider
          - entity: sensor.aguada_volume_total
            name: Sistema Total (m³)
          - entity: sensor.aguada_volume_total_pct
            name: Sistema Total %

      # ── Observações gerais ─────────────────────────────────────────────────
      - type: entities
        title: "▶ 4. Observações / Ocorrências"
        show_header_toggle: false
        entities:
          - entity: input_boolean.aguada_operacao_recarga_externa
            name: Recarga externa em andamento
          - entity: input_boolean.aguada_operacao_manutencao
            name: Manutenção em andamento
          - entity: input_boolean.aguada_cbif_manutencao
            name: Manutenção CBIF
          - entity: input_boolean.aguada_operacao_inspecao_vazamento
            name: Inspeção de vazamento
          - entity: input_text.aguada_relatorio_observacao_geral
            name: Observações gerais / ocorrências

      # ── Prévia do Relatório (espelho) ──────────────────────────────────────
      - type: markdown
        title: "▶ 5. Prévia do Relatório (verificar antes de Gerar)"
        content: >
          ```
          RELATÓRIO DIÁRIO — SISTEMA AGUADA / CMASM
          Data : {{ now().strftime('%d/%m/%Y') }}   Hora: {{ now().strftime('%H:%M') }}
          Inspetor: {{ states('input_text.aguada_relatorio_inspetor') | default('—', true) }}
          ──────────────────────────────────────────────────────────────────────
          RESERVATÓRIOS

          Local               | Anterior (T) | Atual (T)    | Diferença (T)
          ──────────────────────────────────────────────────────────────────────
          Castelo de Consumo  | {{ '%12.1f' % (states('input_number.aguada_relatorio_con_anterior') | float(0) / 1000) }} | {{ '%12.1f' % (states('sensor.aguada_con_volume') | float(0) / 1000) }} | {{ '%+13.1f' % ((states('sensor.aguada_con_volume') | float(0) - states('input_number.aguada_relatorio_con_anterior') | float(0)) / 1000) }}
