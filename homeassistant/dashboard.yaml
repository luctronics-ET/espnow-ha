          ### 🧪 Laudos de Qualidade da Água

          Registre aqui os resultados dos laudos analíticos conforme **Portaria GM/MS nº 2.914/2011**.
          Cada registro é salvo no logbook do sistema com data/hora automática.

          **Parâmetros mínimos (Portaria 2.914/2011):**

          | Parâmetro | Limite | Unidade |
          |---|---|---|
          | pH | 6,0 a 9,5 | — |
          | Cloro residual livre | 0,2 a 5,0 | mg/L |
          | Turbidez | ≤ 1 (dist.) / ≤ 5 (tratada) | uT (NTU) |
