        content: >
          ### 📋 Como acessar o histórico de laudos

          Os laudos são registrados no **Logbook** do Home Assistant.
          Para visualizar:
          1. Acesse o menu lateral → **Logbook** (Diário)
          2. Filtre por: **"Laudo de Qualidade da Água"**
          3. Selecione o período desejado

          Laudos **não conformes** geram um alerta persistente visível no painel principal.

          > Para exportar ou arquivar laudos em PDF, utilize o arquivo original do laboratório.
          > O sistema apenas registra os dados para rastreabilidade operacional.

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 13: REFERÊNCIAS TÉCNICAS
  # Normas, boas práticas, POPs, contatos e guias do sistema hidráulico
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Referências
    path: referencias
    icon: mdi:book-open-page-variant
    badges: []
    cards:

      - type: markdown
        content: >
          # 📚 Referências Técnicas — Sistema Aguada

          Base normativa e operacional do sistema supervisório de abastecimento de água da
          **CMASM — Ilha do Engenho**.

          ---

          ## 1. Normas ABNT Aplicáveis

          | Norma | Título | Aplicação no Sistema |
          |---|---|---|
          | **NBR 12217** | Projeto de reservatório de distribuição | Volumes operacionais, níveis, segurança |
          | **NBR 12218** | Projeto de rede de distribuição | Pontos de coleta, pressões, ligação com bombas |
          | **NBR 12211** | Concepção de sistemas de abastecimento | Visão sistêmica de projeto |
          | **NBR 12214** | Projeto de estação elevatória | Automação de bombas, setpoints |
          | **NBR 12215** | Projeto de adutora de água | Tubulações principais, válvulas |
          | **NBR 5626** | Instalações prediais de água fria | **CRÍTICA:** recalque, níveis mínimos, bloqueios |
          | **NBR ISO 24510** | Avaliação de serviços de água | KPIs, dashboards, indicadores |
          | **NBR ISO 24511** | Gestão de serviços de água e esgoto | Procedimentos operacionais |

          ---

          ## 2. Portaria GM/MS nº 2.914/2011 — Potabilidade

          Estabelece os **padrões de potabilidade** da água para consumo humano.

          | Parâmetro | Valor de Referência | Observação |
          |---|---|---|
          | pH | 6,0 a 9,5 | Distribuição |
          | Turbidez | ≤ 1 uT (NTU) | Na saída do tratamento |
          | Turbidez | ≤ 5 uT (NTU) | Na distribuição (máx.) |
          | Cloro residual livre | 0,2 a 5,0 mg/L | Em toda a rede |
          | Coliformes totais | Ausência | Em 100 mL |
          | *Escherichia coli* | Ausência | Em 100 mL |
          | Fluoreto | 0,6 a 0,9 mg/L | (quando fluoretado) |
          | Nitrato | ≤ 10 mg/L (NO₃⁻) | — |

          > Verificar atualizações/revisões conforme vigência legal.

      - type: markdown
        content: >
          ## 3. Regras de Segurança Operacional (NBR 5626 + NBR 12214)

          ### Hierarquia de Níveis Operacionais

          | Nível | Estado | Ação Requerida |
          |---|---|---|
          | > Máximo | Transbordo | Alarme + parar bomba |
          | Máximo operacional | Normal alto | Parar bomba (modo automático) |
          | Normal | Operação | Manter |
          | Mínimo operacional | Alerta | Ligar bomba (modo automático) |
          | < Mínimo operacional | **BLOQUEIO** | **Desligar bomba — risco de cavitação** |
          | Crítico absoluto | Falha grave | Alarme sonoro + notificação |

          ### Regra de Ouro (NBR 5626)
          > **Nunca acionar bomba com nível abaixo do mínimo operacional.**
          > O risco de operação a seco danifica irreversivelmente a bomba.

          ### Registro Obrigatório de Eventos
          Toda ação de bomba (manual ou automática) deve registrar:
          - Timestamp (UTC)
          - Estado anterior e novo
          - Usuário responsável (se manual)
          - Motivo (se override de bloqueio)

      - type: markdown
        content: >
          ## 4. Boas Práticas Operacionais

          ### Monitoramento de Nível (Sensor Ultrassônico)
          - **Fórmula:** `nivel_cm = nivel_max_cm − (distancia_medida_cm − sensor_offset_cm)`
          - Rejeitar leituras: negativas, zero, acima do máximo de faixa ou salto > 10 cm
          - Utilizar média móvel de 5 amostras (já implementado no firmware)
          - Verificar sensores periodicamente: eco perdido por > 5 min = alarme

          ### Hidrômetros
          - Registrar leituras no mesmo horário padrão (ex: toda Segunda-feira 08:00)
          - Leitura atual deve ser sempre ≥ anterior (o sistema valida automaticamente)
          - Em caso de discrepância > 10%: investigar vazamento ou calibração
          - **Conciliação:** Volume consumido (Δ reservatórios) ≈ Volume medido (Δ hidrômetros)

          ### Laudos de Qualidade
          - Frequência mínima recomendada: mensal (verificar exigências da FUNASA/SAAE)
          - Em caso de não conformidade: notificar imediatamente o responsável sanitário
          - Manter arquivo físico dos laudos laboratoriais originais

          ### Inspeção Visual dos Reservatórios
          - Inspecionar tampas e bordas de transbordamento mensalmente
          - Verificar sinais de infiltração, eflorescência ou trincas
          - Registrar inspeções na aba **Operação**

      - type: markdown
        content: >
          ## 5. Procedimentos Operacionais Resumidos (POPs)

          ### POP-01: Abastecimento por Caminhão-Pipa
          1. Selecionar reservatório destino na aba **Operação**
          2. Ativar toggle **Recarga externa em andamento**
          3. Anotar volume estimado em **Ajuste manual de volume**
          4. Observar variação de nível no dashboard em tempo real
          5. Desativar toggle ao concluir + registrar observação

          ### POP-02: Anomalia de Nível (Queda Acelerada)
          1. Verificar alarme na aba **Vazamentos**
          2. Isolar visualmente o reservatório (fechar válvulas)
          3. Ativar toggle **Inspeção de vazamento**
          4. Registrar ponto suspeito em **Observação do operador**
          5. Notificar responsável técnico

          ### POP-03: Falha de Sensor
          1. Sensor mostrará "unavailable" ou distância inválida
          2. Verificar alimentação do node ESP32 (LED de status)
          3. Verificar canal 1 Wi-Fi (ESP-NOW usa canal fixo)
          4. Verificar conexão USB do gateway (bridge.py)
          5. Se necessário, reiniciar gateway fisicamente

          ### POP-04: Registro de Laudo Analítico
          1. Acessar aba **Laudos**
          2. Preencher todos os campos (ponto, data, parâmetros, conformidade)
          3. Pressionar **Registrar Laudo**
          4. Em caso de **Não conforme**: alarme é gerado e e-mail/notificação enviado

      - type: markdown
        content: >
          ## 6. Fluxograma Hídrico — Ilha do Engenho

          ```
          Água Verm. (HID-AV) ──► Rede AV
                          ┐
          HID-PRAIA      ─┼─► CIE1 / CIE2 ──► CB31 / CB32 ──► CON (Rede Consumo)
          (entrada ilha)  │   (Cisternas)     (Bombas N3)   └► CAV (Rede Incêndio)
                          └─► CBIF ──► ? (Casa de Bombas IF)
          HID-AV|AZ ─────────► Rede AV + AZ
          HID-IF ────────────► CBIF (tubo submarino)
          ```

          ### Capacidades por Reservatório

          | Local | ID | Cap. (L) | Cap. (m³) | Sensores |
          |---|---|---|---|---|
          | Castelo de Consumo | CON | 80.000 | 80 | 1 |
          | Castelo de Incêndio | CAV | 80.000 | 80 | 1 |
          | Casa de Bombas N3.1 | CB31 | 40.000 | 40 | 1 |
          | Casa de Bombas N3.2 | CB32 | 40.000 | 40 | 1 |
          | Cisterna IE 1 | CIE1 | 245.000 | 245 | 1 |
          | Cisterna IE 2 | CIE2 | 245.000 | 245 | 1 |
          | Casa de Bombas IF 1 | CBIF1 | 40.000 | 40 | Sem sensor (manual) |
          | Casa de Bombas IF 2 | CBIF2 | 40.000 | 40 | Sem sensor (manual) |
          | **TOTAL** | — | **810.000** | **810** | — |

      - type: markdown
        content: >
          ## 7. Contatos Institucionais

          | Entidade | Função | Observação |
          |---|---|---|
