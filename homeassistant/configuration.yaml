# ============================================================================
# AGUADA V3 — configuration.yaml COMPLETO (Home Assistant)
# Copie e cole este conteúdo em /config/configuration.yaml
# ============================================================================

homeassistant:
  name: Aguada V3
  unit_system: metric
  temperature_unit: C
  country: BR
  currency: BRL
  # Ajuste se necessário
  time_zone: America/Sao_Paulo

# Recursos padrão do Home Assistant (UI, histórico, mobile app, etc.)
default_config:

# Logs básicos (opcional)
logger:
  default: warning

# MQTT do Aguada
# - Sensores de reservatórios: MQTT Discovery (publicado pelo bridge.py)
# - Sensores de gateway: include manual abaixo
# Arquivos incluídos devem estar em /config (mesma pasta do configuration.yaml)
mqtt: !include mqtt_gateway_sensors.yaml

# Statistics sensors (min/max/taxa/médias)
sensor: !include statistics_sensors.yaml

# Template sensors e binary_sensors (agregados, vazamento, alarmes)
template: !include template_sensors.yaml

# Helpers de operação manual / contexto do operador
input_boolean: !include input_boolean.yaml
input_select: !include input_select.yaml
input_text: !include input_text.yaml
input_number: !include input_number.yaml
input_datetime: !include input_datetime.yaml
input_button: !include input_button.yaml

# Automações Aguada
automation: !include automations.yaml

# Histórico para gráficos/statistics
recorder:
  purge_keep_days: 30
  include:
    entity_globs:
      - sensor.aguada_*
      - binary_sensor.aguada_*
      - input_number.aguada_hidro_*
      - input_number.aguada_laudo_*
      - input_number.aguada_cbif*
      - input_number.aguada_relatorio_*
      - input_select.aguada_cbif_*
      - input_select.aguada_hidro_*
      - input_select.aguada_laudo_*
      - input_boolean.aguada_cbif_*
      - input_datetime.aguada_laudo_*
      - input_text.aguada_relatorio_*

# ---------------------------------------------------------------------------
# DASHBOARD (escolha UMA opção)
# ---------------------------------------------------------------------------

# OPÇÃO A — Recomendado (UI/Storage)
#   Não habilite lovelace abaixo.
#   Vá em Configurações > Dashboards > Adicionar dashboard (YAML)
#   e use o arquivo: dashboard.yaml

# OPÇÃO B — YAML global (ativo — adiciona sidebar "Aguada V3" sem afetar outros dashes)
lovelace:
  dashboards:
    aguada-v3:
      mode: yaml
      title: Aguada V3
      icon: mdi:water
      show_in_sidebar: true
      filename: dashboard.yaml

# ---------------------------------------------------------------------------
# Troubleshooting
# ---------------------------------------------------------------------------
# ERRADO: mqtt: !include mqtt_gateway_sensors.yam
# CERTO : mqtt: !include mqtt_gateway_sensors.yaml
